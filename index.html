<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Vietnam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>   🌏 Explore Vietnam</h1>
<p class="subtitle">
Discover famous destinations by hovering over the images below.
</p>

<div id="image">
    Move your mouse over an image to discover Vietnam!
</div>

<div class="gallery">
    <img src="./1.jpg" alt="Ha Long Bay - A World Natural Heritage"
         onmouseover="upDate(this)" onmouseout="unDo()">

    <img src="./2.jpg" alt="Da Nang - A Modern Coastal City"
         onmouseover="upDate(this)" onmouseout="unDo()">

    <img src="./3.jpg" alt="Hue Imperial City - Rich History"
         onmouseover="upDate(this)" onmouseout="unDo()">

    <img src="./4.jpg" alt="Sapa - Beautiful Mountain Landscapes"
         onmouseover="upDate(this)" onmouseout="unDo()">

    <img src="./5.jpg" alt="Phu Quoc - Paradise Island"
         onmouseover="upDate(this)" onmouseout="unDo()">

    <img src="./6.jpg" alt="Hanoi - The Capital of Vietnam"
         onmouseover="upDate(this)" onmouseout="unDo()">
</div>

<script src="script.js"></script>
<footer>
   | © 2026 Explore Vietnam | 
</footer>

</body>
</html>
